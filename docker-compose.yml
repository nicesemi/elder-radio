# elder-radio + WeSpeek 一体化部署
# WeSpeek: 群组语音聊天室 (Golang + WebRTC)
# Nginx: 反向代理 + 静态资源

services:
  # ---- WeSpeek 语音服务 ----
  wespeek:
    image: newtonmiku/wespeek:latest
    container_name: wespeek
    restart: unless-stopped
    ports:
      - "7000:7000"
      - "3478:3478"
      - "3478:3478/udp"
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./wespeek-data:/data
    environment:
      - WSPEEK_ADDR=:7000
      - WSPEEK_STORE_IMAGES=true
      - WSPEEK_ALLOW_UPLOAD=true
      - WSPEEK_UPLOAD_DIR=/data/uploads
      - TZ=Asia/Shanghai
      - TURN_SERVER_ENABLED=true
      - TURN_SERVER_PORT=3478
      - TURN_SERVER_SECRET=wespeek123
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:alpine
    container_name: elder-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html/radio:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wespeek
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
