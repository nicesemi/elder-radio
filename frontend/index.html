<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="老年收音机">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238B4513' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' font-size='50'>📻</text></svg>">
    <title>老年收音机</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主界面 -->
    <div id="app" class="app-container">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <span class="time-display" id="timeDisplay">--:--</span>
            <span class="device-name">老年智能收音机</span>
            <span class="battery-icon">🔋</span>
        </div>

        <!-- 主面板 -->
        <div class="main-panel">
            <!-- 频道显示区 -->
            <div class="display-area">
                <div class="channel-display" id="channelDisplay">
                    <span class="channel-icon" id="channelIcon">📰</span>
                    <span class="channel-name" id="channelName">新闻</span>
                </div>
                <div class="year-display" id="yearDisplay">
                    <span class="year-label">年代</span>
                    <span class="year-value" id="yearValue">1980</span>
                    <span class="year-unit">年</span>
                </div>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-text">就绪</span>
                </div>
            </div>

            <!-- 频率刻度条 -->
            <div class="frequency-bar">
                <div class="freq-fill" id="freqFill"></div>
                <div class="freq-marker" style="left:12.5%">50s</div>
                <div class="freq-marker" style="left:25%">60s</div>
                <div class="freq-marker" style="left:37.5%">70s</div>
                <div class="freq-marker" style="left:50%">80s</div>
                <div class="freq-marker" style="left:62.5%">90s</div>
                <div class="freq-marker" style="left:75%">00s</div>
                <div class="freq-marker" style="left:87.5%">10s</div>
            </div>

            <!-- 控制区域 -->
            <div class="controls-area">
                <!-- 第一行：调台 + 年代 -->
                <div class="knobs-row">
                    <div class="knob-wrapper">
                        <div class="knob-label">调台</div>
                        <div class="knob" id="channelKnob">
                            <div class="knob-inner">
                                <div class="knob-dot"></div>
                            </div>
                        </div>
                        <div class="knob-value" id="channelKnobValue">新闻</div>
                    </div>

                    <div class="knob-wrapper">
                        <div class="knob-label">调年代</div>
                        <div class="knob" id="yearKnob">
                            <div class="knob-inner">
                                <div class="knob-dot"></div>
                            </div>
                        </div>
                        <div class="knob-value" id="yearKnobValue">1980</div>
                    </div>
                </div>

                <!-- 第二行：音量 + 对讲 -->
                <div class="knobs-row">
                    <div class="knob-wrapper">
                        <div class="knob-label">音量</div>
                        <div class="knob" id="volumeKnob">
                            <div class="knob-inner">
                                <div class="knob-dot"></div>
                            </div>
                        </div>
                        <div class="knob-value" id="volumeKnobValue">50%</div>
                    </div>

                    <div class="knob-wrapper">
                        <div class="knob-label">AI 对讲</div>
                        <button class="ptt-button" id="pttButton">
                            <span class="ptt-icon">🎙️</span>
                            <span class="ptt-text">按住说话</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 播放/停止按钮 -->
            <div class="action-bar">
                <button class="action-btn play-btn" id="playBtn">
                    <span class="btn-icon">▶</span>
                    <span class="btn-text">收听广播</span>
                </button>
                <button class="action-btn stop-btn" id="stopBtn" disabled>
                    <span class="btn-icon">■</span>
                    <span class="btn-text">停止</span>
                </button>
            </div>

            <!-- 对讲对话区 -->
            <div class="chat-area" id="chatArea" style="display:none;">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" class="chat-input" id="chatInput"
                           placeholder="输入问题，点发送...">
                    <button class="chat-send-btn" id="chatSendBtn">发送</button>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <button class="nav-btn active" data-tab="radio">
                <span class="nav-icon">📻</span>
                <span class="nav-label">收音机</span>
            </button>
            <button class="nav-btn" data-tab="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">设置</span>
            </button>
        </div>
    </div>

    <!-- 设置面板 -->
    <div id="settingsPanel" class="settings-panel" style="display:none;">
        <div class="settings-header">
            <button class="back-btn" id="backBtn">← 返回</button>
            <h2>设置</h2>
        </div>
        <div class="settings-content">
            <!-- 播音员选择 -->
            <div class="settings-section">
                <h3>🎤 播音员选择</h3>
                <div class="voice-list" id="voiceList">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- AI对讲声音 -->
            <div class="settings-section">
                <h3>🗣️ AI对讲声音</h3>
                <div class="voice-custom-area">
                    <div class="custom-voice-list" id="customVoiceList">
                        <p class="hint-text">暂无自定义声音</p>
                    </div>
                    <button class="settings-btn" id="uploadVoiceBtn">
                        上传语音样本训练
                    </button>
                    <input type="file" id="voiceFileInput"
                           accept="audio/*" style="display:none;">
                </div>
            </div>

            <!-- 声音包商店 -->
            <div class="settings-section">
                <h3>🛒 声音包商店</h3>
                <div class="preset-list" id="presetList">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- API 配置 -->
            <div class="settings-section">
                <h3>🔑 API 配置</h3>
                <div class="config-form">
                    <label>Agnes API Key</label>
                    <input type="password" id="apiKeyInput"
                           placeholder="输入你的 Agnes API Key">
                    <label>服务地址</label>
                    <input type="text" id="serverUrlInput"
                           value="http://localhost:8765"
                           placeholder="后端服务地址">
                    <button class="settings-btn" id="saveConfigBtn">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 音频播放器 -->
    <audio id="audioPlayer" preload="none"></audio>

    <!-- 录音相关 -->
    <div id="recordingOverlay" class="recording-overlay" style="display:none;">
        <div class="recording-indicator">
            <div class="recording-pulse"></div>
            <div class="recording-text">正在聆听...</div>
            <button class="recording-cancel" id="recordingCancel">松开取消</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
