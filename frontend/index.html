<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年智慧收音机</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e8e8e8;
            --gold: #c9a84c;
            --red: #e94560;
            --green: #4caf50;
            --blue: #4a90d9;
            --font-xl: 2.2rem;
            --font-lg: 1.6rem;
            --font-md: 1.2rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .header h1 {
            font-size: 2.8rem;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .header .subtitle {
            font-size: var(--font-md);
            color: #888;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
        }

        .nav-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            border: 2px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .nav-card:hover, .nav-card:active {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201,168,76,0.2);
        }
        .nav-card .icon {
            font-size: 3.5rem;
        }
        .nav-card .title {
            font-size: var(--font-lg);
            font-weight: bold;
        }
        .nav-card .desc {
            font-size: var(--font-md);
            color: #888;
            line-height: 1.5;
        }

        .nav-card.card-device { border-top: 4px solid var(--red); }
        .nav-card.card-config { border-top: 4px solid var(--gold); }
        .nav-card.card-resources { border-top: 4px solid var(--green); }
        .nav-card.card-admin { border-top: 4px solid var(--blue); }

        .footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            color: #555;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .nav-grid { gap: 16px; padding: 16px; }
            .nav-card { padding: 24px 16px; }
            .header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>老年智慧收音机</h1>
        <p class="subtitle">关怀陪伴 · 智能服务</p>
    </div>

    <div class="nav-grid">
        <a href="/device" class="nav-card card-device">
            <span class="icon">📻</span>
            <span class="title">智能收音机</span>
            <span class="desc">年代广播 · AI对讲</span>
        </a>
        <a href="/config" class="nav-card card-config">
            <span class="icon">🛒</span>
            <span class="title">语音商城</span>
            <span class="desc">定制语音包 · 功能选购</span>
        </a>
        <a href="/resources" class="nav-card card-resources">
            <span class="icon">📚</span>
            <span class="title">年代资源库</span>
            <span class="desc">怀旧内容 · 分类阅读</span>
        </a>
        <a href="/admin" class="nav-card card-admin">
            <span class="icon">⚙️</span>
            <span class="title">管理后台</span>
            <span class="desc">资源审核 · 客户管理</span>
        </a>
    </div>

    <div class="footer">
        &copy; 2024 老年智慧收音机 · 用心陪伴每一位长者
    </div>
</body>
</html>
