<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>elder-radio — 怀旧收音机 · 年代广播</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    /* =============================================
       首页三大区域 — 直播 / 历史 / 年代档案
       保持全局暗色主题，复用 style.css 变量
       ============================================= */

    .container { padding-top: 20px; padding-bottom: 60px; }

    /* ---- 区域通用标题 ---- */
    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .section-title .count-badge {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 3px 12px;
      border-radius: 12px;
    }

    /* ---- 搜索框（区域一）---- */
    .region-search {
      position: relative;
      margin-bottom: 16px;
      max-width: 420px;
    }
    .region-search input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.88rem;
    }
    .region-search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .region-search::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      opacity: 0.5;
    }

    /* ---- 分类筛选 Chip 组 ---- */
    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .category-chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }
    .category-chip:hover { border-color: var(--accent); color: var(--text-primary); }
    .category-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* =============================================
       区域一：2026 直播电台列表
       ============================================= */
    .live-station-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 520px;
      overflow-y: auto;
      margin-bottom: 32px;
    }
    .live-station-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition);
      gap: 12px;
    }
    .live-station-item:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .live-station-item .station-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }
    .live-station-item .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
      animation: livePulse 2s infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .live-station-item .station-name {
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .live-station-item .station-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .live-station-item .category-tag {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* =============================================
       区域二：2020-2025 历史广播可展开卡片
       ============================================= */
    .history-section {
      margin-bottom: 32px;
    }
    .history-year-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-year-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .history-year-card:hover { border-color: var(--accent); }
    .history-year-card.open { border-color: var(--accent); }

    .history-year-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }
    .history-year-header:hover { background: rgba(233, 69, 96, 0.05); }
    .history-year-header .year-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .history-year-header .year-num {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .history-year-header .year-stat {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .history-year-header .expand-icon {
      font-size: 0.75rem;
      color: var(--text-muted);
      transition: transform 0.25s ease;
    }
    .history-year-card.open .expand-icon { transform: rotate(180deg); }

    .history-year-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px 18px;
    }
    .history-year-card.open .history-year-body { display: block; }

    .history-broadcast-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 12px;
    }
    .history-broadcast-item:last-child { border-bottom: none; }
    .history-broadcast-item .bc-title {
      font-size: 0.88rem;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
    }
    .history-broadcast-item .bc-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .history-broadcast-item .bc-play {
      padding: 4px 14px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 0.78rem;
      border: none;
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
    }
    .history-broadcast-item .bc-play:hover { background: var(--accent-hover); }

    /* 样本节目标签 */
    .sample-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 4px;
    }
    .sample-tag {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 0.78rem;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* =============================================
       区域三：1949-2019 年代档案（双频道卡片）
       ============================================= */
    .archive-section {
      margin-bottom: 20px;
    }
    .archive-decade-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .archive-decade-header .decade-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .archive-decade-header .decade-range {
      font-size: 0.82rem;
      color: var(--accent);
      font-family: var(--font-mono);
    }
    .archive-decade-header .collapse-icon {
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: transform 0.25s ease;
    }
    .archive-decade.collapsed .collapse-icon { transform: rotate(-90deg); }
    .archive-decade.collapsed .archive-year-row { display: none; }

    /* 每年的两卡片行 */
    .archive-year-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
      align-items: stretch;
    }
    .archive-channel-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      color: var(--text-primary);
    }
    .archive-channel-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px var(--accent-glow);
      transform: translateY(-1px);
    }
    .archive-channel-card.no-data {
      opacity: 0.5;
      cursor: default;
    }
    .archive-channel-card.no-data:hover {
      border-color: var(--border);
      box-shadow: none;
      transform: none;
    }
    .archive-channel-card .ch-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .archive-channel-card .ch-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .archive-channel-card .ch-year {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .archive-channel-card .ch-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .archive-channel-card .ch-count {
      font-size: 0.72rem;
      font-weight: 500;
      margin-left: auto;
      padding: 3px 10px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ch-count.has-data { background: var(--accent); color: #fff; }
    .ch-count.no-data { background: var(--bg-tertiary); color: var(--text-muted); }

    /* ---- 区域分隔线 ---- */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* ---- 加载与空状态 ---- */
    .loading-inline {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .region-empty {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ---- 响应式 ---- */
    @media (max-width: 600px) {
      .archive-year-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .live-station-item {
        padding: 10px 12px;
        flex-wrap: wrap;
      }
      .live-station-item .station-name { font-size: 0.85rem; }
      .category-chips { gap: 5px; }
      .category-chip { padding: 4px 10px; font-size: 0.72rem; }
    }
  </style>
</head>

<script src="app.js"></script>
<script>
/* =============================================
   index.html - 全年代广播首页引擎
   区域一：2026 直播电台 ( /api/stations/live )
   区域二：2020-2025 历史广播 ( /api/broadcast/history/{year} )
   区域三：1949-2019 年代档案 ( /api/broadcast/summary )
   ============================================= */
(function() {
  'use strict';

  // ---- 安全请求工具 ----
  /** 安全解析 JSON 响应，非 JSON 或失败时返回 null */
  async function safeFetch(path) {
    try {
      var resp = await fetch(path);
      if (!resp.ok) return null;
      var text = await resp.text();
      try { return JSON.parse(text); }
      catch (_) { return null; }
    } catch (_) { return null; }
  }

  /** HTML 转义 */
  function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // ====================================================
  //  区域一：2026 直播电台
  // ====================================================
  (function initRegion1() {
    var listEl   = document.getElementById('liveStationList');
    var countEl  = document.getElementById('liveCount');
    var searchEl = document.getElementById('liveSearch');
    var chipsEl  = document.getElementById('liveCategoryChips');
    var allLiveStations = [];
    var activeCategory = 'all';

    // 分类名中文映射
    var CAT_LABELS = {
      'news': '新闻', 'music': '音乐', 'sports': '体育',
      'talk': '谈话', 'culture': '文化', 'education': '教育',
      'pop': '流行', 'classical': '古典', 'jazz': '爵士',
      'rock': '摇滚', 'folk': '民谣', 'country': '乡村',
      'information': '资讯', 'religious': '宗教', 'variety': '综艺',
      'government': '政务', 'business': '财经', 'weather': '天气',
      'community': '社区', 'college': '校园'
    };
    function labelFor(cat) { return CAT_LABELS[cat] || cat; }

    /** 渲染分类 Chip */
    function renderChips(stations) {
      var cats = new Set();
      stations.forEach(function(s) { cats.add(s.category || '综合'); });
      var sorted = Array.from(cats).sort();
      var html = '<span class="category-chip' + (activeCategory === 'all' ? ' active' : '') + '" data-cat="all">全部</span>';
      sorted.forEach(function(c) {
        html += '<span class="category-chip' + (activeCategory === c ? ' active' : '') + '" data-cat="' + c + '">' + labelFor(c) + '</span>';
      });
      chipsEl.innerHTML = html;

      chipsEl.querySelectorAll('.category-chip').forEach(function(chip) {
        chip.addEventListener('click', function() {
          activeCategory = this.dataset.cat;
          renderChips(allLiveStations);
          renderLiveList();
        });
      });
    }

    /** 渲染直播电台列表 */
    function renderLiveList() {
      var query = (searchEl.value || '').trim().toLowerCase();
      var filtered = allLiveStations;

      // 分类筛选
      if (activeCategory !== 'all') {
        filtered = filtered.filter(function(s) { return (s.category || '综合') === activeCategory; });
      }
      // 关键词搜索（名称/分类/频率）
      if (query) {
        filtered = filtered.filter(function(s) {
          var name = (s.name || '').toLowerCase();
          var cat  = labelFor(s.category || '').toLowerCase();
          var freq = (s.frequency || '').toLowerCase();
          return name.indexOf(query) !== -1 || cat.indexOf(query) !== -1 || freq.indexOf(query) !== -1;
        });
      }

      countEl.textContent = filtered.length + ' 个电台';

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="region-empty">没有匹配的直播电台</div>';
        return;
      }

      // 构建列表 HTML
      listEl.innerHTML = filtered.map(function(s, i) {
        var catLabel = labelFor(s.category || '综合');
        return '<div class="live-station-item" data-idx="' + i + '" data-url="/radio?year=2026&station=' + i + '&mode=fm">' +
          '<div class="station-main"><span class="live-dot"></span><span class="station-name">' + escHtml(s.name || '未知电台') + '</span></div>' +
          '<span class="category-tag">' + escHtml(catLabel) + '</span>' +
          '<span class="station-meta">' + escHtml(s.frequency || '') + '</span>' +
          '</div>';
      }).join('');

      // 绑定点击跳转
      listEl.querySelectorAll('.live-station-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var targetIdx = parseInt(this.dataset.idx);
          var st = filtered[targetIdx];
          var origIdx = allLiveStations.indexOf(st);
          window.location.href = '/radio?year=2026&station=' + (origIdx >= 0 ? origIdx : targetIdx) + '&mode=fm';
        });
      });
    }

    /** 从 radio_sources.json 加载直播电台作为本地兜底 */
    function loadLocalFallback() {
      fetch('/radio_sources.json')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var rawStations = (data.stations || []).filter(function(s) {
            return s.type === 'live' && s.stream_url;
          });
          if (rawStations.length === 0) {
            listEl.innerHTML = '<div class="region-empty">暂无直播电台数据</div>';
            countEl.textContent = '0 个电台';
            chipsEl.innerHTML = '';
            return;
          }
          // 去重（按 stream_url）
          var seen = {};
          var unique = [];
          rawStations.forEach(function(s) {
            var url = (s.stream_url || '').trim();
            if (!url || seen[url]) return;
            seen[url] = true;
            unique.push({
              id: s.id || '',
              name: s.name || '未知电台',
              stream_url: s.stream_url,
              category: s.category || '综合',
              source: s.source || 'local',
              favicon: s.favicon || '',
              frequency: s.frequency || ''
            });
          });
          allLiveStations = unique;
          renderChips(allLiveStations);
          renderLiveList();
          console.log('[首页] API 不可用，已从 radio_sources.json 加载 ' + unique.length + ' 个直播电台');
        }).catch(function() {
          listEl.innerHTML = '<div class="region-empty">加载失败，请稍后重试</div>';
          countEl.textContent = '—';
        });
    }

    // 加载 live stations（API 优先，失败则本地兜底）
    safeFetch('/api/stations/live').then(function(data) {
      if (data && data.stations && data.stations.length > 0) {
        allLiveStations = data.stations;
        renderChips(allLiveStations);
        renderLiveList();
      } else {
        loadLocalFallback();
      }
    }).catch(function() {
      loadLocalFallback();
    });

    // 搜索防抖 250ms
    var searchTimer;
    searchEl.addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderLiveList, 250);
    });
  })();


  // ====================================================
  //  区域二：2020-2025 历史广播（CNTV 回听）
  // ====================================================
  (function initRegion2() {
    var container = document.getElementById('historyYearCards');
    var countEl   = document.getElementById('historyCount');

    safeFetch('/api/cntv/summary').then(function(data) {
      if (!data || !data.years || Object.keys(data.years).length === 0) {
        container.innerHTML = '<div class="region-empty">暂无历史广播数据</div>';
        countEl.textContent = '—';
        return;
      }

      var years = data.years;
      var yearKeys = Object.keys(years).sort();
      var totalDays = 0;
      var totalProgs = 0;

      yearKeys.forEach(function(year) {
        var info = years[year];
        totalDays += info.days || 0;
        totalProgs += info.total_programs || 0;

        var samples = (info.sample || []).slice(0, 5);
        var sampleHtml = samples.length > 0
          ? samples.map(function(s) {
              return '<span class="sample-tag">' + escHtml(s.name) + '</span>';
            }).join('')
          : '<span style="opacity:0.5;font-size:0.82rem;">暂无样本</span>';

        var card = document.createElement('div');
        card.className = 'history-year-card';
        card.innerHTML =
          '<div class="history-year-header">' +
            '<div class="year-left">' +
              '<span class="year-num">' + year + '</span>' +
              '<span class="year-stat">' + info.days + ' 天 · ' + info.total_programs + ' 档节目</span>' +
            '</div>' +
            '<span class="expand-icon">▼</span>' +
          '</div>' +
          '<div class="history-year-body">' +
            '<div class="sample-row">' + sampleHtml + '</div>' +
            '<a href="/radio?year=' + year + '" class="btn btn-accent btn-sm" style="display:inline-block;margin-top:8px;">收听 ' + year + ' 年广播</a>' +
          '</div>';
        container.appendChild(card);

        // 点击展开/折叠
        card.querySelector('.history-year-header').addEventListener('click', function() {
          card.classList.toggle('open');
        });
      });

      countEl.textContent = totalProgs + ' 档节目（' + totalDays + ' 天）';
    }).catch(function() {
      container.innerHTML = '<div class="region-empty">加载失败，请稍后重试</div>';
      countEl.textContent = '—';
    });
  })();


  // ====================================================
  //  区域三：1949-2019 年代档案（双频道卡片）
  // ====================================================
  (function initRegion3() {
    var container = document.getElementById('archiveDecades');
    var countEl   = document.getElementById('archiveCount');
    var DECADES = [
      { label: '建国初期', range: [1949, 1959] },
      { label: '探索时期', range: [1960, 1969] },
      { label: '文革后期', range: [1970, 1979] },
      { label: '改革开放', range: [1980, 1989] },
      { label: '经济腾飞', range: [1990, 1999] },
      { label: '千禧年代', range: [2000, 2009] },
      { label: '新时代',   range: [2010, 2019] }
    ];
    var DEFAULT_OPEN = '新时代'; // 默认展开最近 10 年

    // 年份摘要缓存：{ 1949: {news: N, music: N}, ... }
    var yearSummary = {};

    /** 从 summary 对象安全获取某年数据 */
    function getYearData(year) {
      var yd = yearSummary[year];
      if (yd) return yd;
      // 也尝试 string key
      yd = yearSummary[String(year)];
      if (yd) return yd;
      return { news: 0, music: 0 };
    }

    /** 渲染全部年代 */
    function renderDecades() {
      var totalNews = 0, totalMusic = 0;
      var html = '';

      DECADES.forEach(function(decade) {
        var isOpen = (decade.label === DEFAULT_OPEN);
        var rowsHtml = '';

        for (var y = decade.range[0]; y <= decade.range[1]; y++) {
          var yd = getYearData(y);
          var nc = yd.news || 0;
          var mc = yd.music || 0;
          totalNews += nc;
          totalMusic += mc;

          rowsHtml +=
            '<div class="archive-year-row">' +
              // 新闻频道
              '<a class="archive-channel-card' + (nc === 0 ? ' no-data' : '') + '"' +
              (nc > 0 ? ' href="/radio?year=' + y + '&channel=news"' : ' href="javascript:void(0)"') + '>' +
                '<span class="ch-icon">📰</span>' +
                '<div class="ch-info"><span class="ch-year">' + y + '</span><span class="ch-name">新闻频道</span></div>' +
                '<span class="ch-count ' + (nc > 0 ? 'has-data' : 'no-data') + '">' + (nc > 0 ? nc + ' 条' : '0') + '</span>' +
              '</a>' +
              // 音乐频道
              '<a class="archive-channel-card' + (mc === 0 ? ' no-data' : '') + '"' +
              (mc > 0 ? ' href="/radio?year=' + y + '&channel=music"' : ' href="javascript:void(0)"') + '>' +
                '<span class="ch-icon">🎵</span>' +
                '<div class="ch-info"><span class="ch-year">' + y + '</span><span class="ch-name">音乐频道</span></div>' +
                '<span class="ch-count ' + (mc > 0 ? 'has-data' : 'no-data') + '">' + (mc > 0 ? mc + ' 首' : '0') + '</span>' +
              '</a>' +
            '</div>';
        }

        html +=
          '<div class="archive-decade' + (isOpen ? '' : ' collapsed') + '">' +
            '<div class="archive-decade-header">' +
              '<span class="decade-label">' + decade.label + '</span>' +
              '<span class="decade-range">' + decade.range[0] + ' - ' + decade.range[1] + '</span>' +
              '<span class="collapse-icon">▼</span>' +
            '</div>' +
            rowsHtml +
          '</div>';
      });

      container.innerHTML = html;
      countEl.textContent = (totalNews + totalMusic) + ' 条';

      // 绑定折叠/展开
      container.querySelectorAll('.archive-decade-header').forEach(function(header) {
        header.addEventListener('click', function() {
          this.parentElement.classList.toggle('collapsed');
        });
      });
    }

    // 加载全年代概览
    safeFetch('/api/broadcast/summary').then(function(data) {
      if (data && data.summary) yearSummary = data.summary;
      renderDecades();
    }).catch(function() {
      // API 不存在时全显示 0
      renderDecades();
    });
  })();

})();
</script>
</body>
</html>
