<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群组语音 — elder-radio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    .voice-page {
      padding: 20px;
      max-width: 960px;
      margin: 0 auto;
    }
    .voice-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .voice-cards { grid-template-columns: 1fr; }
    }
    .voice-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .voice-card.full {
      grid-column: 1 / -1;
    }
    .voice-card h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--text-primary);
    }
    .voice-card p {
      font-size: 12px;
      color: var(--text-muted);
      margin: 0 0 10px;
      line-height: 1.5;
    }
    .voice-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .voice-input::placeholder { color: var(--text-muted); }
    .voice-btn {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .voice-btn:hover { opacity: 0.85; }
    .voice-btn.small {
      padding: 4px 12px;
      font-size: 11px;
    }
    .voice-btn.danger {
      background: #e94560;
    }
    .voice-btn.success {
      background: #4CAF50;
    }
    .voice-btn.outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .voice-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .voice-row .voice-input {
      flex: 1;
      margin-bottom: 0;
    }
    .voice-result {
      margin-top: 10px;
      padding: 12px;
      background: rgba(76,175,80,0.08);
      border: 1px solid rgba(76,175,80,0.2);
      border-radius: 8px;
      text-align: center;
    }
    .voice-result .code {
      font-size: 16px;
      font-weight: bold;
      color: #4CAF50;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    .voice-result .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      word-break: break-all;
    }
    .voice-error {
      margin-top: 8px;
      font-size: 12px;
      color: #e94560;
      display: none;
    }
    .voice-error.show { display: block; }

    /* 活跃群组卡片 */
    .active-group-card {
      border-color: #4CAF50;
      background: rgba(76,175,80,0.05);
    }
    .active-group-card h3 {
      color: #4CAF50;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .active-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      box-shadow: 0 0 6px #4CAF50;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .active-group-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(76,175,80,0.06);
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .active-group-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .active-group-code {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .active-group-share {
      font-size: 11px;
      color: var(--text-muted);
      word-break: break-all;
    }
    .active-group-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .active-empty {
      text-align: center;
      padding: 16px;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* 群组列表 */
    .group-list {
      max-height: 300px;
      overflow-y: auto;
    }
    .group-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      margin: 4px 0;
      background: rgba(128,128,128,0.06);
      border-radius: 6px;
      font-size: 12px;
    }
    .group-item.active {
      border: 1px solid #4CAF50;
      background: rgba(76,175,80,0.04);
    }
    .group-item .gname {
      color: var(--text-primary);
    }
    .group-item .gcode {
      color: var(--text-muted);
      font-size: 10px;
      display: block;
    }
    .group-item .gstatus {
      font-size: 10px;
      color: #4CAF50;
      margin-left: 6px;
    }

    /* 确认弹窗 */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .confirm-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 360px;
      text-align: center;
    }
    .confirm-dialog p {
      font-size: 14px;
      color: var(--text-primary);
      margin: 0 0 16px;
      line-height: 1.6;
    }
    .confirm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    /* embed 模式：隐藏导航、去掉顶部留白 */
    body.embed-mode.has-nav { padding-top: 0 !important; }
    .embed-mode .top-nav { display: none !important; }
  </style>
</head>
<body class="has-nav">
<script>
(function() {
  if (new URLSearchParams(window.location.search).get('embed') === '1') {
    document.body.classList.add('embed-mode');
  }
})();
</script>

<nav class="top-nav">
  <a href="/" class="top-nav-brand">elder-radio</a>
  <ul class="top-nav-links">
    <li><a href="/">首页</a></li>
    <li><a href="/radio">收音机</a></li>
    <li><a href="/voice" class="active">群组语音</a></li>
    <li><a href="/maydayradio">五月天</a></li>
    <li><a href="/singer">歌手频道</a></li>
    <li><a href="/config">配置</a></li>
    <li><a href="/admin">管理</a></li>
  </ul>
</nav>

<div class="voice-page">

  <div class="voice-cards">

    <!-- 卡片1：当前活跃群组 -->
    <div class="voice-card full" id="activeCard">
      <h3><span class="active-dot"></span>当前群组</h3>
      <div id="activeContent">
        <div class="active-empty">未加入任何群组，请创建或搜索加入</div>
      </div>
    </div>

    <!-- 卡片2：创建群组 -->
    <div class="voice-card">
      <h3>创建群组</h3>
      <p>创建专属群组，将分享码发给好友即可加入。</p>
      <input class="voice-input" id="createNameInput" placeholder="输入群组名称">
      <button class="voice-btn" id="btnCreateGroup">创建群组</button>
      <div class="voice-result" id="createResult" style="display:none;"></div>
    </div>

    <!-- 卡片3：加入群组 -->
    <div class="voice-card">
      <h3>加入群组</h3>
      <p>输入好友分享的群组码，立即加入。</p>
      <div class="voice-row">
        <input class="voice-input" id="joinCodeInput" placeholder="输入分享码：MDxxxx">
        <button class="voice-btn" id="btnJoinGroup">加入</button>
      </div>
      <div class="voice-error" id="joinError">未找到该群组，请检查分享码</div>
    </div>

    <!-- 卡片4：我的群组 -->
    <div class="voice-card full">
      <h3>我的群组</h3>
      <div class="group-list" id="groupList">
        <p style="color:var(--text-muted);font-size:12px;">暂无群组</p>
      </div>
    </div>

  </div>

</div>

<!-- 确认弹窗 -->
<div id="confirmOverlay" class="confirm-overlay" style="display:none;">
  <div class="confirm-dialog">
    <p id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="voice-btn outline" id="btnConfirmCancel">取消</button>
      <button class="voice-btn danger" id="btnConfirmOk">确认断开</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var STORAGE_KEY   = 'elderradio_groups';
  var ACTIVE_KEY    = 'elderradio_active_group';

  var createNameInput = document.getElementById('createNameInput');
  var btnCreateGroup  = document.getElementById('btnCreateGroup');
  var createResult    = document.getElementById('createResult');
  var joinCodeInput   = document.getElementById('joinCodeInput');
  var btnJoinGroup    = document.getElementById('btnJoinGroup');
  var joinError       = document.getElementById('joinError');
  var groupListEl     = document.getElementById('groupList');
  var activeContent   = document.getElementById('activeContent');

  var confirmOverlay  = document.getElementById('confirmOverlay');
  var confirmMsg      = document.getElementById('confirmMsg');
  var btnConfirmOk    = document.getElementById('btnConfirmOk');
  var btnConfirmCancel = document.getElementById('btnConfirmCancel');

  var pendingAction = null; // 待确认的动作回调

  // ==================== 存储 ====================
  function loadGroups() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch(e) { return []; }
  }
  function saveGroups(groups) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(groups));
  }
  function getActiveGroupId() {
    return localStorage.getItem(ACTIVE_KEY) || null;
  }
  function setActiveGroupId(id) {
    if (id) {
      localStorage.setItem(ACTIVE_KEY, id);
    } else {
      localStorage.removeItem(ACTIVE_KEY);
    }
  }
  function getActiveGroup() {
    var activeId = getActiveGroupId();
    if (!activeId) return null;
    var groups = loadGroups();
    return groups.find(function(g) { return g.id === activeId; }) || null;
  }
  function generateShareCode() {
    return 'MD' + Date.now().toString(36).toUpperCase();
  }

  // ==================== 确认弹窗 ====================
  function showConfirm(msg, onOk) {
    confirmMsg.textContent = msg;
    pendingAction = onOk;
    confirmOverlay.style.display = 'flex';
  }
  function hideConfirm() {
    confirmOverlay.style.display = 'none';
    pendingAction = null;
  }
  btnConfirmOk.addEventListener('click', function() {
    var action = pendingAction;
    hideConfirm();
    if (action) action();
  });
  btnConfirmCancel.addEventListener('click', hideConfirm);

  // ==================== 设置活跃群组 ====================
  function switchActiveGroup(groupId, groupName) {
    var current = getActiveGroup();
    if (current && current.id !== groupId) {
      // 已有活跃群组，需要确认断开
      showConfirm('当前已加入「' + current.name + '」，\n是否断开并切换到「' + groupName + '」？', function() {
        doSwitch(groupId);
      });
    } else if (!current) {
      doSwitch(groupId);
    }
    // 如果点击的是同一个群组，什么都不做（或可以断开）
  }

  function doSwitch(groupId) {
    var groups = loadGroups();
    var g = groups.find(function(x) { return x.id === groupId; });
    if (!g) return;
    setActiveGroupId(groupId);
    renderAll();
  }

  function disconnectActiveGroup() {
    showConfirm('确定要退出当前群组吗？', function() {
      setActiveGroupId(null);
      renderAll();
    });
  }

  // ==================== 创建群组 ====================
  btnCreateGroup.addEventListener('click', function() {
    var name = createNameInput.value.trim();
    if (!name) {
      name = '语音群组';
      createNameInput.value = name;
    }
    var groups = loadGroups();
    var groupId = generateShareCode();
    var group = {
      id: groupId,
      name: name,
      created: new Date().toISOString(),
      members: 1
    };
    groups.unshift(group);
    saveGroups(groups);

    var shareLink = window.location.origin + '/voice?join=' + groupId;
    createResult.style.display = '';
    createResult.innerHTML =
      '<p style="color:#4CAF50;font-size:13px;margin:0 0 8px;">群组「' + name + '」创建成功</p>' +
      '<p class="code">' + groupId + '</p>' +
      '<p class="hint">' + shareLink + '</p>' +
      '<button class="voice-btn small" style="margin-top:8px;" id="btnCopyCode">复制分享码</button>';
    document.getElementById('btnCopyCode').addEventListener('click', function() {
      navigator.clipboard.writeText(groupId).then(function() {
        alert('分享码已复制: ' + groupId);
      });
    });
    createNameInput.value = '';

    // 新创建的群组自动设为活跃
    switchActiveGroup(groupId, name);
  });

  // ==================== 加入群组 ====================
  btnJoinGroup.addEventListener('click', function() {
    var code = joinCodeInput.value.trim().toUpperCase();
    if (!code) { joinError.classList.add('show'); return; }
    joinError.classList.remove('show');

    var groups = loadGroups();
    var g = groups.find(function(x) { return x.id === code; });
    if (g) {
      g.members = (g.members || 1) + 1;
      saveGroups(groups);
      joinCodeInput.value = '';
      switchActiveGroup(g.id, g.name);
    } else {
      joinError.classList.add('show');
    }
  });
  joinCodeInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') btnJoinGroup.click();
  });

  // ==================== 渲染活跃群组卡片 ====================
  function renderActiveCard() {
    var active = getActiveGroup();
    if (!active) {
      activeContent.innerHTML = '<div class="active-empty">未加入任何群组，请创建或搜索加入</div>';
      return;
    }
    var shareLink = window.location.origin + '/voice?join=' + active.id;
    activeContent.innerHTML =
      '<div class="active-group-info">' +
        '<div>' +
          '<div class="active-group-name">' + active.name + '</div>' +
          '<div class="active-group-code">' + active.id + '</div>' +
          '<div class="active-group-share">分享链接：' + shareLink + '</div>' +
        '</div>' +
        '<div class="active-group-actions">' +
          '<button class="voice-btn small" id="btnCopyActive">复制分享码</button>' +
          '<a href="/maydayradio" class="voice-btn small success" style="display:inline-block;text-decoration:none;">去对讲</a>' +
          '<button class="voice-btn small danger" id="btnDisconnect">退出群组</button>' +
        '</div>' +
      '</div>';
    document.getElementById('btnCopyActive').addEventListener('click', function() {
      navigator.clipboard.writeText(active.id).then(function() {
        alert('分享码已复制: ' + active.id);
      });
    });
    document.getElementById('btnDisconnect').addEventListener('click', disconnectActiveGroup);
  }

  // ==================== 渲染群组列表 ====================
  function renderGroupList() {
    var groups = loadGroups();
    var activeId = getActiveGroupId();

    if (groups.length === 0) {
      groupListEl.innerHTML = '<p style="color:var(--text-muted);font-size:12px;">暂无群组</p>';
      return;
    }

    groupListEl.innerHTML = groups.map(function(g) {
      var isActive = (g.id === activeId);
      return '<div class="group-item' + (isActive ? ' active' : '') + '">' +
        '<div>' +
          '<span class="gname">' + g.name + '</span>' +
          (isActive ? '<span class="gstatus">● 当前</span>' : '') +
          '<span class="gcode">' + g.id + '</span>' +
        '</div>' +
        (isActive
          ? '<button class="voice-btn small danger" data-gid="' + g.id + '">退出</button>'
          : '<button class="voice-btn small outline" data-gid="' + g.id + '">加入</button>'
        ) +
        '</div>';
    }).join('');

    // 绑定按钮事件
    groupListEl.querySelectorAll('.voice-btn.small').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var gid = this.dataset.gid;
        var gs = loadGroups();
        var g = gs.find(function(x) { return x.id === gid; });
        if (!g) return;

        if (this.classList.contains('danger')) {
          // 退出按钮
          disconnectActiveGroup();
        } else if (this.classList.contains('outline')) {
          // 加入按钮
          switchActiveGroup(gid, g.name);
        }
      });
    });
  }

  function renderAll() {
    renderActiveCard();
    renderGroupList();
  }

  // ==================== URL 参数 ====================
  function loadFromURL() {
    var params = new URLSearchParams(window.location.search);
    var joinId = params.get('join');
    if (joinId) {
      joinId = joinId.trim().toUpperCase();
      setTimeout(function() {
        var groups = loadGroups();
        var g = groups.find(function(x) { return x.id === joinId; });
        if (g) {
          g.members = (g.members || 1) + 1;
          saveGroups(groups);
          // 通过分享链接进入，直接设为活跃（无需确认）
          var current = getActiveGroup();
          if (current && current.id !== joinId) {
            showConfirm('当前已加入「' + current.name + '」，\n是否断开并切换到「' + g.name + '」？', function() {
              doSwitch(joinId);
            });
          } else {
            doSwitch(joinId);
          }
        }
      }, 300);
    }
  }

  // ==================== 初始化 ====================
  renderAll();
  loadFromURL();

})();
</script>
</body>
</html>
