<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群组语音 — elder-radio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    .voice-wrapper {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
    }
    .room-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .room-bar label {
      font-size: 0.82rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .room-bar input {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 0.85rem;
    }
    .room-bar button {
      padding: 6px 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .room-bar button:hover {
      opacity: 0.85;
    }
    .jitsi-frame {
      flex: 1;
      border: none;
    }
  </style>
</head>
<body class="has-nav">

<!-- ========== 导航栏 ========== -->
<nav class="top-nav">
  <a href="/" class="top-nav-brand">elder-radio</a>
  <ul class="top-nav-links">
    <li><a href="/">首页</a></li>
    <li><a href="/radio">收音机</a></li>
    <li><a href="/voice" class="active">群组语音</a></li>
    <li><a href="/maydayradio">五月天</a></li>
    <li><a href="/singer">歌手频道</a></li>
    <li><a href="/config">配置</a></li>
    <li><a href="/admin">管理</a></li>
  </ul>
</nav>

<div class="voice-wrapper">
  <div class="room-bar">
    <label for="roomName">房间名：</label>
    <input type="text" id="roomName" placeholder="输入房间名后点击加入">
    <button id="joinBtn">加入 / 创建</button>
  </div>
  <iframe id="jitsiFrame" class="jitsi-frame"
          allow="camera; microphone; fullscreen; display-capture"
          style="display:none"></iframe>
</div>

<script>
(function() {
  var input   = document.getElementById('roomName');
  var btn     = document.getElementById('joinBtn');
  var iframe  = document.getElementById('jitsiFrame');

  // 默认房间名（包含日期，每天自动换房）
  var today = new Date().toISOString().slice(0, 10);
  var defaultRoom = 'elder-radio-' + today;
  input.value = defaultRoom;

  function joinRoom() {
    var room = input.value.trim();
    if (!room) return;
    // Jitsi Meet 公共实例，免费零配置
    iframe.src = 'https://meet.jit.si/' + encodeURIComponent(room) + '#config.prejoinPageEnabled=false';
    iframe.style.display = '';
    input.disabled = true;
    btn.textContent = '已加入';
  }

  btn.addEventListener('click', joinRoom);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') joinRoom();
  });
})();
</script>
</body>
</html>
