<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>业务员对讲 - 小店接单</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, sans-serif;
  background: #1a1a2e;
  color: #e0d8c8;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}
.container {
  width: 100%;
  max-width: 420px;
  background: linear-gradient(145deg, #2d2d3f, #252538);
  border-radius: 20px;
  border: 2px solid #8b7355;
  box-shadow: 0 0 30px rgba(139,115,85,0.15);
  padding: 20px;
}
.header {
  text-align: center;
  margin-bottom: 18px;
}
.header h1 {
  font-size: 20px;
  color: #d4a574;
  letter-spacing: 1px;
}
.header .shop-info {
  font-size: 13px;
  color: #999;
  margin-top: 4px;
}
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e1e30;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 16px;
  border: 1px solid #444;
}
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-dot.online { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
.status-dot.busy { background: #ff9800; box-shadow: 0 0 8px #ff9800; }
.status-label {
  font-size: 14px;
  color: #aaa;
}
.status-label small {
  font-size: 11px;
  color: #666;
  display: block;
}
.queue-badge {
  background: #c0392b;
  color: #fff;
  border-radius: 12px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: bold;
  display: none;
}
.queue-badge.show { display: inline-block; }

.transfer-list {
  margin-bottom: 16px;
  max-height: 200px;
  overflow-y: auto;
}
.transfer-item {
  background: #1e1e30;
  border: 1px solid #444;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.transfer-item:hover {
  border-color: #d4a574;
  background: #252540;
}
.transfer-item .t-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.transfer-item .t-chan {
  font-size: 12px;
  color: #d4a574;
  font-weight: bold;
}
.transfer-item .t-time {
  font-size: 11px;
  color: #666;
}
.transfer-item .t-msg {
  font-size: 13px;
  color: #ccc;
  line-height: 1.4;
}
.transfer-item .t-tag {
  display: inline-block;
  background: #8b7355;
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 4px;
}

.chat-area {
  background: #0d0d1a;
  border-radius: 12px;
  border: 1px solid #333;
  padding: 12px;
  margin-bottom: 16px;
  min-height: 200px;
  max-height: 300px;
  overflow-y: auto;
  display: none;
}
.chat-area.active { display: block; }
.chat-msg {
  margin-bottom: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 85%;
}
.chat-msg.customer {
  background: #2d2d3f;
  color: #e0d8c8;
  margin-right: auto;
  border-bottom-left-radius: 2px;
}
.chat-msg.agent {
  background: #5c4033;
  color: #f0e0c8;
  margin-left: auto;
  border-bottom-right-radius: 2px;
}
.chat-msg.system {
  background: transparent;
  color: #888;
  font-size: 11px;
  text-align: center;
  max-width: 100%;
  padding: 4px;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
}
.btn {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: bold;
}
.btn-accept {
  background: #4caf50;
  color: #fff;
  flex: 1;
}
.btn-accept:hover { background: #43a047; }
.btn-accept:active { transform: scale(0.97); }
.btn-ptt {
  background: #c0392b;
  color: #fff;
  flex: 2;
  height: 60px;
  font-size: 18px;
  letter-spacing: 2px;
  border-radius: 30px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.btn-ptt:active, .btn-ptt.recording {
  background: #e74c3c;
  transform: scale(0.95);
  box-shadow: 0 0 20px rgba(231,76,60,0.5);
}
.btn-ptt.disabled {
  background: #555;
  color: #999;
  cursor: not-allowed;
}
.text-input-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.text-input-row input {
  flex: 1;
  background: #1e1e30;
  border: 1px solid #444;
  border-radius: 8px;
  padding: 10px;
  color: #e0d8c8;
  font-size: 14px;
}
.text-input-row input::placeholder { color: #666; }
.text-input-row button {
  background: #8b7355;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
}

.empty-state {
  text-align: center;
  color: #666;
  padding: 30px 0;
  font-size: 14px;
  line-height: 1.8;
}
.empty-state .icon {
  font-size: 40px;
  margin-bottom: 10px;
}

/* 底部导航 */
.nav-bar {
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #333;
  margin-top: 16px;
  padding-top: 12px;
}
.nav-btn {
  background: none;
  border: none;
  color: #888;
  font-size: 11px;
  cursor: pointer;
  padding: 6px;
  text-align: center;
}
.nav-btn.active { color: #d4a574; }
.nav-btn .n-icon { font-size: 20px; display: block; margin-bottom: 2px; }

/* 通知 toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #d4a574;
  color: #1a1a2e;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  z-index: 999;
  animation: toastIn 0.3s ease;
  display: none;
}
.toast.show { display: block; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>小店对讲机</h1>
    <div class="shop-info" id="shopInfo">便利店 · 南山店</div>
  </div>

  <div class="status-bar">
    <div>
      <span class="status-dot online" id="statusDot"></span>
      <span class="status-label" id="statusLabel">
        在线待机
        <small>等待转接...</small>
      </span>
    </div>
    <span class="queue-badge" id="queueBadge">0</span>
  </div>

  <div class="transfer-list" id="transferList">
    <div class="empty-state">
      <div class="icon">📻</div>
      暂无转接请求<br>等待客户发起对讲...
    </div>
  </div>

  <div class="chat-area" id="chatArea">
  </div>

  <div class="controls" id="controlsMain">
    <button class="btn btn-accept" id="btnAccept" onclick="acceptLatest()" disabled>接听</button>
    <button class="btn btn-ptt disabled" id="btnPTT"
            onmousedown="startPTT()" onmouseup="stopPTT()" onmouseleave="stopPTT()"
            ontouchstart="startPTT()" ontouchend="stopPTT()" ontouchcancel="stopPTT()">
      按住说话
    </button>
  </div>

  <div class="text-input-row">
    <input type="text" id="textInput" placeholder="打字回复客户..." onkeydown="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">发送</button>
  </div>

  <div class="nav-bar">
    <button class="nav-btn active" onclick="switchTab('pending')">
      <span class="n-icon">📋</span>待接
    </button>
    <button class="nav-btn" onclick="switchTab('active')">
      <span class="n-icon">💬</span>通话中
    </button>
    <button class="nav-btn" onclick="switchTab('history')">
      <span class="n-icon">📜</span>记录
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="agent.js"></script>
</body>
</html>
