<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年代资源库 - 老年收音机</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e8e8e8;
            --text-secondary: #a0a0b0;
            --gold: #c9a84c;
            --green: #4caf50;
            --blue: #4a90d9;
            --font-xl: 2rem;
            --font-lg: 1.4rem;
            --font-md: 1.1rem;
            --font-sm: 0.95rem;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container { max-width: 700px; margin: 0 auto; padding: 16px; }

        .header {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 0; margin-bottom: 12px;
        }
        .back-btn { background: none; border: none; color: var(--blue); font-size: var(--font-lg); cursor: pointer; padding: 8px; text-decoration: none; }
        .header h1 { font-size: var(--font-xl); color: var(--gold); }

        .search-bar {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .search-input {
            flex: 1; padding: 14px 18px; border-radius: 12px;
            border: 2px solid #2a2a3e; background: #0a0a1a; color: #fff;
            font-size: var(--font-md); outline: none;
        }
        .search-input:focus { border-color: var(--blue); }
        .search-btn {
            padding: 14px 24px; border-radius: 12px; border: none;
            background: var(--blue); color: #fff; font-size: var(--font-md); font-weight: bold; cursor: pointer;
        }

        /* Filter Chips */
        .filter-section { margin-bottom: 12px; }
        .filter-label { font-size: var(--font-md); color: var(--text-secondary); margin-bottom: 8px; font-weight: bold; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            padding: 8px 18px; border-radius: 20px; border: 2px solid #2a2a3e;
            background: transparent; color: var(--text-secondary); font-size: var(--font-sm);
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .chip:hover { border-color: var(--blue); }
        .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

        /* Article List */
        .article-list { display: flex; flex-direction: column; gap: 16px; }
        .article-card {
            background: var(--card-bg); border-radius: 16px;
            padding: 20px; border: 2px solid #2a2a3e;
            cursor: pointer; transition: border-color 0.2s;
        }
        .article-card:hover { border-color: var(--gold); }
        .article-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .article-title { font-size: var(--font-lg); font-weight: bold; }
        .article-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .article-tag {
            font-size: var(--font-sm); padding: 3px 10px; border-radius: 12px;
            background: rgba(201,168,76,0.15); color: var(--gold);
        }
        .article-summary { font-size: var(--font-md); color: var(--text-secondary); line-height: 1.6; }

        /* Detail Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 50;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg); border-radius: 20px; padding: 24px;
            max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto;
            border: 2px solid #2a2a3e;
        }
        .modal-title { font-size: var(--font-xl); font-weight: bold; margin-bottom: 16px; color: var(--gold); }
        .modal-content { font-size: var(--font-md); line-height: 1.8; margin-bottom: 16px; white-space: pre-wrap; }
        .modal-close {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: var(--blue); color: #fff; font-size: var(--font-md); font-weight: bold; cursor: pointer;
        }
        .modal audio { width: 100%; margin-top: 8px; }

        .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: var(--font-md); }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: var(--font-lg); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">← 首页</a>
            <h1>年代资源库</h1>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索您感兴趣的内容...">
            <button class="search-btn" id="searchBtn">搜索</button>
        </div>

        <div class="filter-section">
            <div class="filter-label">年代</div>
            <div class="chip-row" id="eraChips">
                <button class="chip active" data-era="">全部</button>
                <button class="chip" data-era="1950s">1950s</button>
                <button class="chip" data-era="1960s">1960s</button>
                <button class="chip" data-era="1970s">1970s</button>
                <button class="chip" data-era="1980s">1980s</button>
                <button class="chip" data-era="1990s">1990s</button>
                <button class="chip" data-era="2000s">2000s</button>
                <button class="chip" data-era="2010s">2010s</button>
                <button class="chip" data-era="2020s">2020s</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-label">分类</div>
            <div class="chip-row" id="catChips">
                <button class="chip active" data-cat="">全部</button>
                <button class="chip" data-cat="news">新闻</button>
                <button class="chip" data-cat="sports">体育</button>
                <button class="chip" data-cat="music">音乐</button>
                <button class="chip" data-cat="finance">金融</button>
                <button class="chip" data-cat="culture">文化</button>
                <button class="chip" data-cat="technology">科技</button>
            </div>
        </div>

        <div class="article-list" id="articleList"><div class="loading">加载中...</div></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-content" id="modalContent"></div>
            <audio id="modalAudio" controls style="display:none;"></audio>
            <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ggzlxzillydjhcgodqbc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__OVyHq9MDZOb_U3xwuOjpQ_1YY0809b';

        let currentEra = '', currentCat = '';

        async function apiCall(endpoint) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1${endpoint}`, {
                headers: { 'Content-Type':'application/json' }
            });
            if (!res.ok) throw new Error(`API ${res.status}`);
            return res.json();
        }

        function escapeHtml(s) {
            const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            document.getElementById('modalAudio').pause();
        }
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function openDetail(article) {
            document.getElementById('modalTitle').textContent = article.title;
            document.getElementById('modalContent').textContent = article.content || '暂无详细内容';
            const audio = document.getElementById('modalAudio');
            if (article.audio_url) {
                audio.src = article.audio_url; audio.style.display = 'block';
            } else {
                audio.style.display = 'none';
            }
            document.getElementById('modal').classList.add('show');
        }

        // Era chips
        document.querySelectorAll('#eraChips .chip').forEach(c => {
            c.addEventListener('click', () => {
                document.querySelectorAll('#eraChips .chip').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                currentEra = c.dataset.era;
                loadArticles();
            });
        });

        // Category chips
        document.querySelectorAll('#catChips .chip').forEach(c => {
            c.addEventListener('click', () => {
                document.querySelectorAll('#catChips .chip').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                currentCat = c.dataset.cat;
                loadArticles();
            });
        });

        // Search
        document.getElementById('searchBtn').addEventListener('click', loadArticles);
        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') loadArticles();
        });

        async function loadArticles() {
            const list = document.getElementById('articleList');
            list.innerHTML = '<div class="loading">加载中...</div>';

            try {
                let filters = ['status=eq.published'];
                if (currentEra) filters.push(`era=eq.${currentEra}`);
                if (currentCat) filters.push(`category=eq.${currentCat}`);

                const searchText = document.getElementById('searchInput').value.trim();
                if (searchText) filters.push(`title=ilike.*${searchText}*`);

                const query = '?' + filters.join('&') + '&order=created_at.desc&limit=50';
                const articles = await apiCall('/resource_articles' + query);

                if (!articles.length) {
                    list.innerHTML = '<div class="empty">暂无相关内容</div>'; return;
                }

                const catNames = {
                    news:'新闻', sports:'体育', music:'音乐',
                    finance:'金融', culture:'文化', technology:'科技'
                };

                list.innerHTML = articles.map(a => `
                    <div class="article-card" onclick="openDetail(${JSON.stringify(a).replace(/"/g, '&quot;')})">
                        <div class="article-header">
                            <span class="article-title">${escapeHtml(a.title)}</span>
                        </div>
                        <div class="article-meta">
                            <span class="article-tag">${escapeHtml(a.era)}</span>
                            <span class="article-tag">${catNames[a.category] || a.category}</span>
                        </div>
                        <div class="article-summary">${escapeHtml(a.summary || (a.content||'').substring(0,100))}</div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty">加载失败，请确认数据库已迁移</div>';
            }
        }

        loadArticles();
    </script>
</body>
</html>
